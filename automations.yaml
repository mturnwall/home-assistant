- id: '1730266432073'
  alias: Garage - Lights
  description: Turn on garage lights when garage door or entry door is opened.
  triggers:
  - trigger: state
    entity_id:
    - cover.garage_opener_door
    to: opening
    id: garage_door_opened
  - trigger: state
    entity_id:
    - cover.garage_opener_door
    id: garage_door_closed
    to: closed
  - trigger: state
    entity_id:
    - binary_sensor.garage_entry_open_close
    to: 'on'
    id: garage_entry_opened
  - trigger: state
    entity_id:
    - binary_sensor.garage_entry_open_close
    to: 'off'
    id: garage_entry_closed
  - trigger: state
    entity_id:
    - binary_sensor.garage_motion_detection
    to: 'on'
    id: motion_detected
  - trigger: state
    entity_id:
    - binary_sensor.garage_motion_detection
    id: motion_cleared
    to: 'off'
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.turn_off_garage_lights
    id: timer_finished
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - garage_door_opened
        - garage_entry_opened
        - motion_detected
      sequence:
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: light.garage_shop_lights_right
      - action: timer.cancel
        target:
          entity_id:
          - timer.turn_off_garage_lights
        data: {}
    - conditions:
      - condition: trigger
        id:
        - timer_finished
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.garage_shop_lights_right
    - conditions:
      - condition: trigger
        id:
        - motion_cleared
        - garage_door_closed
        - garage_entry_closed
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.turn_off_garage_lights
  mode: single
