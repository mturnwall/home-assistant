- id: '1771148498598'
  alias: 3D Printer Auto Shutoff
  description: Turns off each printer's smart plug when finished and nozzle cools
    below 50°C
  triggers:
  - trigger: numeric_state
    entity_id: sensor.defiant_nozzle_temperature
    below: 50
    variables:
      plug: switch.3rd_reality_zigbee_plug_2
      print_status: sensor.defiant_print_status
  - trigger: numeric_state
    entity_id: sensor.enterprise_nozzle_temperature
    below: 50
    variables:
      plug: switch.3rd_reality_zigbee_plug_3
      print_status: sensor.enterprise_print_status
  conditions:
  - condition: template
    value_template: '{{ states(print_status) == finish }}'
  - condition: state
    entity_id: input_select.house_status
    state:
    - Sleep
  actions:
  - action: switch.turn_off
    target:
      entity_id: '{{ plug }}'
    data: {}
  mode: parallel
  max: 2
