- id: '1765904021422'
  alias: Garage VOC Status Light
  description: Change the led light for the garage air sensor based on the VOC level
  triggers:
  - trigger: template
    value_template: '{{ is_state(''sensor.garage_air_quality_voc_quality'', [''Improved'',
      ''Normal'']) }}'
    id: normal
  - trigger: template
    value_template: '{{ is_state(''sensor.garage_air_quality_voc_quality'', ''Abnormal'')
      }}'
    id: abnormal
  - trigger: template
    value_template: '{{ is_state(''sensor.garage_air_quality_voc_quality'', ''Very
      abnormal'') }}'
    id: very_abnormal
  - trigger: template
    value_template: '{{ is_state(''sensor.garage_air_quality_voc_quality'', ''Extremely
      abnormal'') }}'
    id: extremely_abnormal
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - normal
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.garage_air_quality_rgb_light
        data:
          brightness_pct: 99
          rgb_color:
          - 0
          - 128
          - 0
    - conditions:
      - condition: trigger
        id:
        - abnormal
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.garage_air_quality_rgb_light
        data:
          brightness_pct: 99
          rgb_color:
          - 255
          - 255
          - 3
    - conditions:
      - condition: trigger
        id:
        - very_abnormal
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.garage_air_quality_rgb_light
        data:
          brightness_pct: 99
          rgb_color:
          - 255
          - 165
          - 3
    - conditions:
      - condition: trigger
        id:
        - extremely_abnormal
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.garage_air_quality_rgb_light
        data:
          brightness_pct: 99
          rgb_color:
          - 255
          - 0
          - 0
  mode: single
